<style>
:root{--green:#16a34a;--red:#dc2626;--grey:#6b7280;--blue:#2563eb;--gold:#f59e0b;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--sub:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
#loadingScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:linear-gradient(135deg,#0f172a,#1e3a5f,#2563eb)}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:rgba(255,255,255,.8);font-size:.9rem;font-weight:600}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f172a,#1e3a5f,#2563eb)}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.login-logo{font-size:2rem;font-weight:900;color:#2563eb;letter-spacing:2px}
.login-sub{color:var(--sub);margin:4px 0;font-size:.85rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.login-tagline{color:#94a3b8;font-size:.78rem;margin-bottom:24px}
.user-select{display:grid;gap:8px;margin-bottom:16px}
.user-btn{padding:12px 14px;border:2px solid var(--border);border-radius:12px;background:#f8fafc;cursor:pointer;font-size:.95rem;font-weight:600;transition:.2s;text-align:left;display:flex;align-items:center;gap:10px;width:100%}
.user-btn:hover{border-color:#2563eb;background:#eff6ff}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
.pin-label{font-size:.88rem;color:var(--sub);margin-bottom:10px}
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:#f1f5f9;transition:.2s}
.pin-dot.filled{background:#2563eb;border-color:#2563eb}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:15px;border:none;border-radius:10px;background:#f1f5f9;font-size:1.2rem;font-weight:700;cursor:pointer}
.pin-key:active{background:#dbeafe;transform:scale(.95)}
.pin-key.del{background:#fee2e2;color:#dc2626}
.login-err{color:#dc2626;font-size:.83rem;margin-top:8px;min-height:18px}
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:linear-gradient(90deg,#0f172a,#2563eb);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-weight:900;font-size:1.1rem}
.topbar-user{font-size:.75rem;opacity:.8;margin-top:2px}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600}
.sync-indicator{font-size:.7rem;padding:3px 8px;border-radius:20px;font-weight:700;margin-left:8px}
.sync-ok{background:rgba(22,163,74,.3);color:#86efac}
.sync-err{background:rgba(220,38,38,.3);color:#fca5a5}
.sync-pending{background:rgba(245,158,11,.3);color:#fcd34d}
.pg-bar{background:#0f172a;padding:10px 16px;overflow-x:auto;display:flex;gap:8px;scrollbar-width:none}
.pg-bar::-webkit-scrollbar{display:none}
.pg-chip{padding:7px 14px;border-radius:20px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;border:2px solid transparent;color:rgba(255,255,255,.5)}
.pg-chip.active{color:#fff;border-color:currentColor}
.nav-tabs{display:flex;background:#1e3a5f;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:11px 16px;color:rgba(255,255,255,.6);font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
.nav-tab.active{color:#fff;border-bottom-color:#f59e0b}
.content{flex:1;padding:16px;max-width:960px;margin:0 auto;width:100%}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:var(--card);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:1.8rem;font-weight:900}
.stat-label{font-size:.75rem;color:var(--sub);margin-top:2px}
.stat-box.green .stat-num{color:var(--green)}
.stat-box.red .stat-num{color:var(--red)}
.stat-box.blue .stat-num{color:var(--blue)}
.stat-box.gold .stat-num{color:var(--gold)}
.search-bar{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:.92rem;margin-bottom:12px;outline:none}
.search-bar:focus{border-color:#2563eb}
.student-row{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.student-row:last-child{border-bottom:none}
.student-name{font-weight:700;font-size:.95rem}
.att-btns{display:flex;gap:7px;margin-left:auto}
.att-btn{padding:10px 18px;border:none;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;opacity:.4}
.att-btn.active{opacity:1}
.att-btn.present{background:#dcfce7;color:var(--green)}
.att-btn.absent{background:#fee2e2;color:var(--red)}
.att-btn.present.active{background:var(--green);color:#fff}
.att-btn.absent.active{background:var(--red);color:#fff}
.notes-input{width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:.8rem;margin-top:5px;outline:none}
.badge{font-size:.7rem;padding:2px 7px;border-radius:20px;font-weight:700;display:inline-block}
.badge.green{background:#dcfce7;color:var(--green)}
.badge.red{background:#fee2e2;color:var(--red)}
.badge.grey{background:#f1f5f9;color:var(--grey)}
.badge.blue{background:#eff6ff;color:#2563eb}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-size:.82rem;font-weight:700;color:var(--sub)}
.form-input,.form-select{padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.92rem;outline:none;width:100%}
.form-input:focus,.form-select:focus{border-color:#2563eb}
.btn{padding:11px 20px;border:none;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn-success{background:#dcfce7;color:#16a34a}
.btn-gold{background:#fef3c7;color:#d97706}
.btn-sm{padding:6px 11px;font-size:.77rem}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{background:#f1f5f9;padding:9px 11px;text-align:left;font-weight:700;color:var(--sub);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.today-header{background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px}
.today-date{font-size:1.3rem;font-weight:900}
.today-sub{opacity:.75;font-size:.85rem;margin-top:2px}
.shift-slot-btn{padding:13px 10px;border:2px solid var(--border);border-radius:11px;background:#f8fafc;cursor:pointer;text-align:center;font-size:.85rem;width:100%}
.shift-slot-btn.selected{border-color:#2563eb;background:#eff6ff}
.pg-section-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 14px;border-radius:10px;color:#fff;font-weight:800;font-size:1rem}
.week-day{border-radius:10px;padding:13px;border:2px solid var(--border);margin-bottom:8px}
.week-day.has-shift{border-color:#2563eb;background:#eff6ff}
.week-day.today-day{border-color:#f59e0b;background:#fffbeb}
.week-day-name{font-weight:800;font-size:.92rem}
.week-day-info{font-size:.82rem;color:var(--sub);margin-top:3px}
.progress-bar{height:7px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:99px}
.any-day-notice{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:.83rem;color:#92400e;font-weight:600}
.offline-banner{background:#dc2626;color:#fff;text-align:center;padding:8px;font-size:.82rem;font-weight:700}
@media(min-width:600px){.stat-grid{grid-template-columns:repeat(4,1fr)}.student-row{flex-wrap:nowrap}.att-btns{margin-left:auto;flex-shrink:0}}

// ─── FIREBASE SYNC ────────────────────────────────────────────────────────────
function setSyncStatus(state) {
  var el = document.getElementById('syncIndicator');
  if(!el) return;
  el.className = 'sync-indicator sync-' + state;
  el.textContent = state==='ok'?'● Live': state==='err'?'● Error':'● Saving…';
}

// Write a specific path to Firebase
function fbSet(path, value, cb) {
  setSyncStatus('pending');
  fbdb.ref(path).set(value, function(err){
    setSyncStatus(err ? 'err' : 'ok');
    if(cb) cb(err);
  });
}
function fbUpdate(path, value, cb) {
  setSyncStatus('pending');
  fbdb.ref(path).update(value, function(err){
    setSyncStatus(err ? 'err' : 'ok');
    if(cb) cb(err);
  });
}
function fbRemove(path, cb) {
  setSyncStatus('pending');
  fbdb.ref(path).remove(function(err){
    setSyncStatus(err ? 'err' : 'ok');
    if(cb) cb(err);
  });
}

// Granular saves for hot paths (attendance, shifts)
function saveAttendance(key, value) {
  if(value===null || value===undefined) {
    fbRemove('cfcParkour/attendance/'+safeKey(key));
  } else {
    fbSet('cfcParkour/attendance/'+safeKey(key), value);
  }
}
function saveShifts() { fbSet('cfcParkour/shifts', DB.shifts||[]); }
function savePersonalSessions() { fbSet('cfcParkour/personalSessions', DB.personalSessions||[]); }

function savePayrollMonth() { fbSet('cfcParkour/payrollMonth', DB.payrollMonth||''); }

// Firebase doesn't allow dots/slashes in keys
function safeKey(k) { return k.replace(/\./g,'_').replace(/\//g,'_').replace(/#/g,'_').replace(/\$/g,'_').replace(/\[/g,'_').replace(/\]/g,'_'); }
function unSafeKey(k) { return k; } // keys don't need reversing — we store original in value

// ─── LOAD FROM FIREBASE ───────────────────────────────────────────────────────
function loadFromFirebase(cb) {
  fbdb.ref('cfcParkour').once('value', function(snap) {
    var data = snap.val() || {};
    // Merge student active flags with master
    var flags = data.studentFlags || {};
    var sm = {};
    MASTER_STUDENTS.forEach(function(m){ sm[m.id] = m; });
    DB.students = MASTER_STUDENTS.map(function(m){
      var flag = flags[m.id];
      return Object.assign({}, m, {active: flag ? flag.active : true});
    });
    // Extra manually-added students stored separately
    if(data.extraStudents) {
      Object.values(data.extraStudents).forEach(function(s){ DB.students.push(s); });
    }
    // Restore attendance — keys were safeKey'd
    DB.attendance = {};
    if(data.attendance) {
      Object.keys(data.attendance).forEach(function(k){
        // Restore original key (replace _ back only for date separator)
        DB.attendance[k] = data.attendance[k];
      });
    }
    DB.shifts = data.shifts || [];
    // Firebase stores arrays as objects if there are gaps — normalise
    if(data.shifts && !Array.isArray(data.shifts)) {
      DB.shifts = Object.values(data.shifts);
    }
    DB.personalSessions = data.personalSessions || [];
    if(data.personalSessions && !Array.isArray(data.personalSessions)) {
      DB.personalSessions = Object.values(data.personalSessions);
    }
    DB.correctionLog = data.correctionLog || [];
    if(data.correctionLog && !Array.isArray(data.correctionLog)) {
      DB.correctionLog = Object.values(data.correctionLog);
    }
    DB.coachPins = data.coachPins || {};
    DB.expenses = data.expenses || {};
    DB.payrollMonth = data.payrollMonth || '';
    DB.expenseMonth = data.expenseMonth || '';
    _fbLoaded = true;
    cb();
  }, function(err) {
    // Firebase read failed — try localStorage fallback
    console.warn('Firebase read failed, using localStorage fallback', err);
    loadFromLocalStorage();
    _fbLoaded = true;
    cb();
  });
}

function loadFromLocalStorage() {
  try {
    var s = localStorage.getItem('cfcParkourDB3');
    if(s) {
      var p = JSON.parse(s);
      var sm = {};
      (p.students||[]).forEach(function(x){ sm[x.id]=x; });
      DB.students = MASTER_STUDENTS.map(function(m){ return sm[m.id]?Object.assign({},m,{active:sm[m.id].active}):m; });
      var mids={};
      MASTER_STUDENTS.forEach(function(x){mids[x.id]=true;});
      (p.students||[]).filter(function(x){return !mids[x.id];}).forEach(function(x){DB.students.push(x);});
      DB.attendance=p.attendance||{};
      DB.shifts=p.shifts||[];
      DB.personalSessions=p.personalSessions||[];
      DB.correctionLog=p.correctionLog||[];
      DB.coachPins=p.coachPins||{};
      DB.expenses=p.expenses||{};
      DB.payrollMonth=p.payrollMonth||'';
      DB.expenseMonth=p.expenseMonth||'';
    } else {
      DB.students = MASTER_STUDENTS.slice();
    }
  } catch(e) { DB.students = MASTER_STUDENTS.slice(); }
}

// Real-time listener — updates DB.attendance live when other coaches mark attendance
function startRealtimeListeners() {
  fbdb.ref('cfcParkour/attendance').on('value', function(snap){
    DB.attendance = snap.val() || {};
  });
  fbdb.ref('cfcParkour/shifts').on('value', function(snap){
    var v = snap.val();
    if(v) DB.shifts = Array.isArray(v)?v:Object.values(v);
  });
  fbdb.ref('cfcParkour/coachPins').on('value', function(snap){
    DB.coachPins = snap.val() || {};
  });
  // Online/offline detection
  fbdb.ref('.info/connected').on('value', function(snap){
    var online = snap.val() === true;
    var banner = document.getElementById('offlineBanner');
    if(banner) banner.classList.toggle('hidden', online);
    setSyncStatus(online ? 'ok' : 'err');
  });
}

function todayDate(){ return new Date().toISOString().split('T')[0]; }
function todayDay(){ return new Date().toLocaleDateString('en-US',{weekday:'long'}); }
function todayFull(){ return new Date().toLocaleDateString('en-ZA',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function tsNow(){ return new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'}); }
function attKey(d,sid){ return safeKey(d+'_'+sid); }
function uid(){ return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }
function getPG(id){ return PLAYGROUPS.filter(function(p){return p.id===id;})[0]; }
function isAnyDay(pgId){ return ANY_DAY_GROUPS.indexOf(pgId)>=0; }
function coachName(k){ return USERS[k]?USERS[k].name:k; }
function fullName(s){ return (s.first+' '+s.last).trim(); }
function getDaysForPG(pgId){ return PG_DAYS[pgId]||['Monday','Tuesday','Wednesday','Thursday','Friday']; }
function h(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function classifierOptions(pgId){
  if(pgId==='aisj') return ['KG','Grade 1','Grade 2','Grade 3','Grade 4','Grade 6'];
  if(pgId==='ninjas') return ['10 yrs','11 yrs','12 yrs','13 yrs','14 yrs','15 yrs'];
  if(pgId==='apex') return ['16+'];
  if(pgId==='lninjas') return ['5 yrs','6 yrs','7 yrs','8 yrs','9 yrs','10 yrs'];
  return ['3-4 yrs','5-6 yrs','7-8 yrs','9-10 yrs','11-12 yrs','13-17 yrs','18+'];
}
function getStudentsForSession(pgId, date) {
  var students = DB.students.filter(function(s){ return s.active && s.playgroup===pgId; });
  if(isAnyDay(pgId)) return students;
  var dayName = new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long'});
  return students.filter(function(s){ return s.day===dayName; });
}

function corrSearchStudent(q){
  var list=document.getElementById('corrStudentList');
  if(!q||q.length<2){list.innerHTML='';return;}

function applyCorrection(){
  if(!_corrStudentId){alert('Select a student first.');return;}
  var date=document.getElementById('corrDate').value;
  var status=document.getElementById('corrStatus').value;
  var reason=document.getElementById('corrReason').value.trim()||'Admin correction';
  var key=attKey(date,_corrStudentId);
  if(status==='clear'){
    delete DB.attendance[key];
    saveAttendance(key,null);
  } else {
    var record={status:status,timestamp:tsNow(),coach:'Amanda (Override)',notes:reason};
    DB.attendance[key]=record;
    saveAttendance(key,record);
  }
  if(!DB.correctionLog) DB.correctionLog=[];
  var s=DB.students.filter(function(x){return x.id===_corrStudentId;})[0];
  DB.correctionLog.unshift({id:uid(),student:fullName(s),date:date,status:status,reason:reason,at:tsNow()});
  saveCorrectionLog();
  alert('Correction applied for '+fullName(s)); _corrStudentId=null; renderCorrections();
}
function renderCorrLog(){
  var log=DB.correctionLog||[];

  var html='<div class="table-wrap"><table><tr><th>Date</th><th>Student</th><th>Changed To</th><th>Reason</th><th>Time</th></tr>';
  log.slice(0,20).forEach(function(c){

function updateSlots(){
  var pgId=document.getElementById('shPG')?document.getElementById('shPG').value:'';

  if(!grid) return;

function pickSlot(btn){

function applyManualTime(){

function logPersonalSession(){
  var clientId=document.getElementById('psClient').value; var coach=document.getElementById('psCoach').value;
  var date=document.getElementById('psDate').value; var status=document.getElementById('psStatus').value;
  var start=document.getElementById('psStart').value; var end=document.getElementById('psEnd').value;

function renderPSHistory(sessions){

  });
  return html+'</table></div>';
}
function filterPSSessions(q){

}
function deletePSSession(id){

// ─── REPORTS ──────────────────────────────────────────────────────────────────
function renderReports(){
  var mc=document.getElementById('mainContent'); var pg=getPG(currentPG);
  var rows=DB.students.filter(function(s){return s.active&&s.playgroup===currentPG&&s.day!=='flexible';}).map(function(s){
    var records=Object.keys(DB.attendance).filter(function(k){return k.indexOf('_'+s.id)>=0;}).map(function(k){return DB.attendance[k];}).filter(function(v){return v&&v.status;});
    var present=records.filter(function(v){return v.status==='present';}).length;
    var total=records.length;
    return {s:s,total:total,present:present,absent:total-present,pct:total?Math.round(present/total*100):0};
  });
  window._reportRows=rows;
  mc.innerHTML='<div class="pg-section-header" style="background:'+pg.color+'">'+pg.emoji+' '+pg.label+' - Reports</div>'
    +(isAnyDay(currentPG)?'<div class="any-day-notice">🥷 Showing all sessions this student was marked across all dates.</div>':'')
    +'<div class="card"><input class="search-bar" placeholder="Search..." oninput="filterReport(this.value)">'
    +'<div id="reportTable">'+buildReportTable(rows)+'</div></div>'
    +'<div class="card"><div class="card-title">📥 Export</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:10px">'
    +'<button class="btn btn-primary" onclick="exportCSV()">📊 Attendance CSV</button>'
    +'<button class="btn btn-gold" onclick="exportPayrollCSV()">💰 Payroll CSV</button></div></div>';
}
function buildReportTable(rows){
  if(!rows.length) return '<div style="color:var(--sub)">No data yet.</div>';
  var html='<div class="table-wrap"><table><tr><th>Student</th><th>Day</th><th>Group</th><th>Sessions</th><th>Present</th><th>Absent</th><th>%</th></tr>';
  rows.forEach(function(r){
    var cls=r.pct>=80?'green':r.pct>=60?'gold':'red';
    html+='<tr><td><strong>'+h(fullName(r.s))+'</strong></td><td>'+(r.s.day==='any'?'Any':r.s.day)+'</td><td>'+h(r.s.classifier)+'</td>'
      +'<td>'+r.total+'</td><td style="color:var(--green);font-weight:700">'+r.present+'</td>'
      +'<td style="color:var(--red);font-weight:700">'+r.absent+'</td><td><span class="badge '+cls+'">'+r.pct+'%</span></td></tr>';
  });
  return html+'</table></div>';
}
function filterReport(q){ document.getElementById('reportTable').innerHTML=buildReportTable((window._reportRows||[]).filter(function(r){return fullName(r.s).toLowerCase().indexOf(q.toLowerCase())>=0;})); }
function exportCSV(){
  var rows=['Student,Playgroup,Day,Classifier,Sessions,Present,Absent,Attendance%'];
  DB.students.filter(function(s){return s.active&&s.playgroup===currentPG;}).forEach(function(s){
    var records=Object.keys(DB.attendance).filter(function(k){return k.indexOf('_'+s.id)>=0;}).map(function(k){return DB.attendance[k];}).filter(function(v){return v&&v.status;});
    var present=records.filter(function(v){return v.status==='present';}).length; var total=records.length;
    rows.push('"'+fullName(s)+'",'+(getPG(s.playgroup)?getPG(s.playgroup).label:'')+','+(s.day==='any'?'Any':s.day)+','+s.classifier+','+total+','+present+','+(total-present)+','+(total?Math.round(present/total*100):0)+'%');
  });
  dlCSV(rows.join('\n'),'CFC_'+(getPG(currentPG)?getPG(currentPG).label:currentPG)+'_Attendance.csv');
}
function exportPayrollCSV(){
  var rows=['Coach,Playgroup,Day,Date,Start,End'];
  DB.shifts.filter(function(s){return !!s.date;}).forEach(function(s){
    rows.push(coachName(s.coach)+','+(getPG(s.playgroup)?getPG(s.playgroup).label:s.playgroup)+','+s.day+','+s.date+','+s.startTime+','+s.endTime);
  });
  dlCSV(rows.join('\n'),'CFC_Payroll.csv');
}
function dlCSV(content,filename){ var a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(content); a.download=filename; a.click(); }

function addExtraExp(month){
  var label=prompt('Expense name:'); if(!label||!label.trim()) return;

  if(!DB.expenses[month]) DB.expenses[month]={};

function updateExtraAmt(idx,val,month){
  if(!DB.expenses||!DB.expenses[month]||!DB.expenses[month].extras) return;
  DB.expenses[month].extras[idx].amount=Number(val); saveExpenses(); renderExpenses();
}
function deleteExtraExp(idx,month){

}

  if(!DB.expenses) DB.expenses={};

  var html='<div class="today-header"><div class="today-date">'+day+' Session</div><div class="today-sub">'+todayFull()+'</div></div>';
  myShifts.forEach(function(shift){
    var pg=getPG(shift.playgroup); var anyDay=isAnyDay(shift.playgroup);
    var students=getStudentsForSession(shift.playgroup,date);
    html+='<div style="background:'+(pg?pg.color:'#2563eb')+';color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:8px;font-weight:700">'
      +(pg?pg.emoji+' '+pg.label:'')+' · '+shift.startTime+'-'+shift.endTime
      +(anyDay?' <span style="font-size:.75rem;opacity:.8">(mark who showed up today)</span>':'')+'</div>';
    if(anyDay) html+='<div class="any-day-notice" style="margin-bottom:8px">All registered students shown — mark only those present today.</div>';
    html+='<div class="card" style="margin-bottom:16px">'
      +'<input class="search-bar" placeholder="Search..." oninput="filterCoachAtt(this.value,\''+shift.playgroup+'\',\''+date+'\',\'al_'+shift.id+'\')">'
      +'<div id="al_'+shift.id+'">'+renderCoachAttRows(students,date)+'</div></div>';
  });
  mc.innerHTML=html;
}
function filterCoachAtt(q,pgId,date,listId){
  var s=getStudentsForSession(pgId,date).filter(function(s){return fullName(s).toLowerCase().indexOf(q.toLowerCase())>=0;});
  var el=document.getElementById(listId); if(el) el.innerHTML=renderCoachAttRows(s,date);
}
function renderCoachAttRows(students,date){
  if(!students.length) return '<div style="color:var(--sub);padding:12px 0">No students for this session.</div>';
  return students.map(function(s){
    var a=DB.attendance[attKey(date,s.id)]||{};
    return '<div class="student-row" id="row_'+s.id+'">'
      +'<div style="flex:1"><div class="student-name">'+h(fullName(s))+'</div>'
      +'<div style="display:flex;gap:5px;margin-top:2px"><span class="badge blue">'+h(s.classifier)+'</span>'
      +(s.day==='any'?'<span class="badge grey">Any day</span>':'')
      +'<span style="font-size:.7rem;color:var(--sub);margin-top:3px" id="ts_'+s.id+'">'+(a.timestamp?'✓ '+a.timestamp:'Not marked')+'</span></div>'
      +'<input class="notes-input" placeholder="Notes..." value="'+h(a.notes||'')+'" onchange="updateNotes(\''+s.id+'\',\''+date+'\',this.value)"></div>'
      +'<div class="att-btns">'
      +'<button class="att-btn present'+(a.status==='present'?' active':'')+'" onclick="markAtt(\''+s.id+'\',\''+date+'\',\'present\')" id="bp_'+s.id+'">✓</button>'
      +'<button class="att-btn absent'+(a.status==='absent'?' active':'')+'" onclick="markAtt(\''+s.id+'\',\''+date+'\',\'absent\')" id="ba_'+s.id+'">✗</button>'
      +'</div></div>';
  }).join('');
}
function renderMyStats(){
  var mc=document.getElementById('mainContent');
  var myShifts=DB.shifts.filter(function(s){return s.coach===currentUser.key&&!!s.date;});
  var hrs=myShifts.reduce(function(acc,s){var sh=parseInt(s.startTime.split(':')[0])*60+parseInt(s.startTime.split(':')[1]);var eh=parseInt(s.endTime.split(':')[0])*60+parseInt(s.endTime.split(':')[1]);return acc+(eh-sh)/60;},0);
  var ps=(DB.personalSessions||[]).filter(function(s){return s.coach===currentUser.key;}).length;
  var rate=COACH_RATES[currentUser.key]||100; var pay=(myShifts.length+ps)*rate;
  var html='<div class="card"><div class="card-title">📈 My Stats</div>'
    +'<div class="stat-grid">'
    +'<div class="stat-box blue"><div class="stat-num">'+myShifts.length+'</div><div class="stat-label">Shifts</div></div>'
    +'<div class="stat-box green"><div class="stat-num">'+hrs.toFixed(1)+'</div><div class="stat-label">Hours</div></div>'
    +'<div class="stat-box gold"><div class="stat-num">R'+pay+'</div><div class="stat-label">Est. Earnings</div></div>'
    +'<div class="stat-box"><div class="stat-num" style="color:#7c3aed">'+ps+'</div><div class="stat-label">Personal Classes</div></div></div></div>'
    +'<div class="card"><div class="card-title">📋 Shift History</div>';
  if(myShifts.length){
    html+='<div class="table-wrap"><table><tr><th>Playgroup</th><th>Day</th><th>Date</th><th>Time</th></tr>';
    myShifts.forEach(function(s){var pg=getPG(s.playgroup);html+='<tr><td>'+(pg?pg.emoji+' '+pg.label:s.playgroup)+'</td><td>'+s.day+'</td><td>'+(s.date||'-')+'</td><td>'+s.startTime+'-'+s.endTime+'</td></tr>';});
    html+='</table></div>';
  } else {html+='<div style="color:var(--sub)">No confirmed shifts yet.</div>';}
  mc.innerHTML=html+'</div>';
}
</script>
</body>
</html>
